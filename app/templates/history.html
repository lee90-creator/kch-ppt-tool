{% extends "base.html" %}

{% block content %}
<section class="card page-heading">
  <p class="eyebrow">작업 이력</p>
  <div class="page-heading__row">
    <div>
      <h1>최근 작업 목록</h1>
      <p class="muted">완료, 실패, 취소된 작업의 상태와 다운로드 링크를 확인합니다.</p>
    </div>
    <button id="refresh-history" class="button button--ghost" type="button">새로고침</button>
  </div>
</section>

<section class="card table-card">
  <div class="table-wrap">
    <table class="data-table" aria-describedby="history-empty">
      <thead>
        <tr>
          <th scope="col">일시</th>
          <th scope="col">상태</th>
          <th scope="col">CLI</th>
          <th scope="col">다운로드</th>
        </tr>
      </thead>
      <tbody id="history-table-body"></tbody>
    </table>
  </div>
  <p id="history-empty" class="muted" hidden>아직 저장된 작업 이력이 없습니다.</p>
  <p id="history-message" class="form-message" role="status" aria-live="polite"></p>
</section>
{% endblock %}
